<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Rachid Coaching Life — Clarté. Discipline. Action.</title>

<meta name="description" content="Coaching de vie lucide. Des vidéos concrètes pour avancer sans attendre la motivation.">

<style>
:root {
  --primary: #0f172a;
  --accent: #22c1dc;
  --accent2: #facc15;
  --text: #1e293b;
  --muted: #64748b;
  --bg: #ffffff;
}

*{margin:0;padding:0;box-sizing:border-box;}

body{
  font-family: -apple-system, sans-serif;
  background: var(--bg);
  color: var(--text);
}

.container{
  max-width:1100px;
  margin:auto;
  padding:20px;
}

/* HEADER */
header{
  display:flex;
  align-items:center;
  justify-content:space-between;
  padding:20px;
  border-bottom:1px solid #eee;
}

/* LOGO CERCLE */
.logo-wrap{
  width:70px;
  height:70px;
  border-radius:50%;
  background: linear-gradient(135deg,#22c1dc,#a7f3d0,#fde68a);
  display:flex;
  align-items:center;
  justify-content:center;
}

.logo-wrap img{
  width:80%;
}

/* HERO */
.hero{
  text-align:center;
  padding:60px 20px;
}

.hero h1{
  font-size:42px;
}

.hero p{
  color:var(--muted);
  margin-top:15px;
}

/* SERVICES */
.services{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
  gap:20px;
  margin-top:40px;
}

.service{
  padding:20px;
  border:1px solid #eee;
  border-radius:12px;
}

.service img{
  width:40px;
  margin-bottom:10px;
}

/* VIDEOS */
.videos{
  margin-top:60px;
}

.video-grid{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(260px,1fr));
  gap:20px;
}

.video-card{
  border-radius:16px;
  overflow:hidden;
  box-shadow:0 8px 20px rgba(0,0,0,0.08);
}

video{
  width:100%;
  height:auto;
  display:block;
}

/* CONTACT */
.social{
  display:flex;
  justify-content:center;
  gap:20px;
  margin-top:40px;
}

.social img{
  width:30px;
}

/* FOOTER */
footer{
  margin-top:60px;
  text-align:center;
  font-size:14px;
  color:var(--muted);
}
</style>

</head>

<body>

<header class="container">
  <div class="logo-wrap">
    <img src="images/logo.svg" alt="logo">
  </div>
</header>

<section class="hero container">
  <h1>80 ans de sagesse. 0 bullshit.</h1>
  <p>Des conseils concrets pour avancer sans attendre la motivation.</p>
</section>

<section class="container">
  <div class="services">

    <div class="service">
      <img src="images/service-brain.png">
      <h3>Clarté mentale</h3>
      <p>Identifier les vrais blocages.</p>
    </div>

    <div class="service">
      <img src="images/service-heart.png">
      <h3>Discipline</h3>
      <p>Construire une stabilité réelle.</p>
    </div>

    <div class="service">
      <img src="images/mallette-service.png">
      <h3>Conseils pratiques</h3>
      <p>Des actions concrètes.</p>
    </div>

  </div>
</section>

<section class="videos container">
  <h2>Contenu vidéo</h2>

  <div class="video-grid">

    <div class="video-card">
      <video controls>
        <source src="TikTok/ennuie.mp4" type="video/mp4">
      </video>
    </div>

    <div class="video-card">
      <video controls>
        <source src="TikTok/impasse.mp4" type="video/mp4">
      </video>
    </div>

    <div class="video-card">
      <video controls>
        <source src="TikTok/silence.mp4" type="video/mp4">
      </video>
    </div>

  </div>
</section>

<section class="container social">
  <a href="https://instagram.com/rachid_coaching_life">
    <img src="images/icons/instagram-icon.png">
  </a>

  <a href="https://facebook.com/rachid.coachinglife">
    <img src="images/icons/facebook-icon.png">
  </a>

  <a href="https://tiktok.com/@rachid_coaching_life">
    <img src="images/icons/tiktok-icon.png">
  </a>
</section>

<footer>
  © 2026 Rachid Coaching Life
</footer>

</body>
</html>
